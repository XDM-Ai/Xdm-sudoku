<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Xudoku</title>
<style>
   
 body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0f14;
    color: #eaeaea;
    display: flex;
    flex-direction: column;
    align-items: center;
}
h1 {
    margin-top: 20px;
    font-size: 28px;
    letter-spacing: 3px;
    color: #7cf7ff;
    text-shadow: 0 0 15px #2fffea;
}
.board {
    display: grid;
    grid-template-columns: repeat(9, min(11vw, 48px));
    grid-template-rows: repeat(9, min(11vw, 48px));

    margin-top: 20px;
    padding: 12px;

    border-radius: 14px;

    background: #151a22;
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.06);
    box-shadow:
        0 0 25px rgba(0,255,255,0.12),
        inset 0 0 10px rgba(255,255,255,0.05);
}
input {
    width: 100%;
    height: 100%;

    border: none;
    outline: none;

    text-align: center;
    font-size: clamp(18px, 4vw, 22px);

    border-radius: 6px;

     background: #10151c;
     color: #d7e1ff;
   
    transition: 0.15s ease;

    user-select: none;
}
   
input:active {
    transform: scale(1.15);
    background: rgba(124,247,255,0.15);
}
    input:focus {
    transform: scale(1.1);
    background: rgba(255,255,255,0.08);
    box-shadow: 0 0 12px #7cf7ff;
}
    
       input:disabled {
    background: #222a36;
    color: #ffffff;
    font-weight: bold;
    text-shadow: 0 0 2px rgba(255,255,255,0.2);
    }

  .correct {
    background: #163a2b;
    color: #b6f7d8;
    box-shadow: 0 0 10px rgba(0,255,180,0.3);
}

.wrong {
    background: #3a1616;
    color: #ffb3b3;
    box-shadow: 0 0 10px rgba(255,60,90,0.3);
}
    div strong {
    color: #aaa;
}

#timer, #score {
    color: #7cf7ff;
    font-weight: bold;
}

    input:nth-child(3n) {
    border-right: 1px solid rgba(124, 247, 255, 0.3);
}

.board input:nth-child(n + 19):nth-child(-n + 27),
.board input:nth-child(n + 46):nth-child(-n + 54) {
    border-bottom: 2px solid rgba(124, 247, 255, 0.25);
}

   .top-bar {
    width: 90%;
    max-width: 420px;
    margin-top: 15px;

    display: flex;
    justify-content: space-between;

    padding: 12px 18px;
    border-radius: 12px;

    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 0 20px rgba(0,255,255,0.1);
}

.stat {
    font-size: 14px;
    color: #7cf7ff;
    font-weight: bold;
}

   .controls {
    width: 90%;
    max-width: 420px;

    margin-top: 20px;
    margin-bottom: 30px;

    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
}

button {
    padding: 12px;
    border: none;
    border-radius: 10px;

    background: rgba(255,255,255,0.06);
    color:  #dcdcdc;

    font-weight: bold;

    backdrop-filter: blur(10px);

    transition: 0.2s ease;
}

button:active {
    transform: scale(0.97);
    background:  rgba(255,255,255,0.1);
}
</style>
</head>
<body>

<h1>Xudoku</h1>

<div>
    <strong>Time:</strong> <span id="timer">0</span> sec
</div>

<div>
    <strong>Score:</strong> <span id="score">0</span>
</div>

   <div class="top-bar">
    <div class="stat">⏱ <span id="timer">0</span>s</div>
    <div class="stat">🏆 <span id="score">0</span></div>
</div>

<div class="board" id="board"></div>

    <h2>Select Difficulty</h2>
<div class="controls">
    <button onclick="setDifficulty('easy')">Easy</button>
    <button onclick="setDifficulty('medium')">Medium</button>
    <button onclick="setDifficulty('hard')">Hard</button>
    <button onclick="newGame()">New Game</button>
   </div>
    <button onclick="resetGame()">Reset</button>
<script>
/* =========================
   🎮 GAME STATE
========================= */
let solution = [];
let puzzle = [];
let difficulty = "medium";

let time = 0;
let timerInterval = null;

let score = 0;

const board = document.getElementById("board");
const SAVE_KEY = "sudoku_save_v1";

/* =========================
   🧠 GRID ENGINE
========================= */

function createEmptyGrid() {
    return Array.from({ length: 9 }, () => Array(9).fill(0));
}

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

function isValid(grid, row, col, num) {
    for (let x = 0; x < 9; x++) {
        if (grid[row][x] === num) return false;
        if (grid[x][col] === num) return false;
    }

    let startRow = Math.floor(row / 3) * 3;
    let startCol = Math.floor(col / 3) * 3;

    for (let r = 0; r < 3; r++) {
        for (let c = 0; c < 3; c++) {
            if (grid[startRow + r][startCol + c] === num) return false;
        }
    }

    return true;
}

function solve(grid) {
    for (let r = 0; r < 9; r++) {
        for (let c = 0; c < 9; c++) {

            if (grid[r][c] === 0) {
                let nums = [1,2,3,4,5,6,7,8,9];
                shuffle(nums);

                for (let n of nums) {
                    if (isValid(grid, r, c, n)) {
                        grid[r][c] = n;

                        if (solve(grid)) return true;

                        grid[r][c] = 0;
                    }
                }
                return false;
            }
        }
    }
    return true;
}

function generateSolution() {
    let grid = createEmptyGrid();
    solve(grid);
    return grid;
}

function generatePuzzle(grid, removeCount) {
    let puzzleGrid = grid.map(row => [...row]);

    let removed = 0;

    while (removed < removeCount) {
        let r = Math.floor(Math.random() * 9);
        let c = Math.floor(Math.random() * 9);

        if (puzzleGrid[r][c] !== 0) {
            puzzleGrid[r][c] = 0;
            removed++;
        }
    }

    return puzzleGrid;
}

/* =========================
   🧩 GAME BOARD UI
========================= */

function createBoard() {
    board.innerHTML = "";

    for (let r = 0; r < 9; r++) {
        for (let c = 0; c < 9; c++) {

            const input = document.createElement("input");

            if (puzzle[r][c] !== 0) {
                input.value = puzzle[r][c];
                input.disabled = true;
            }

            input.dataset.row = r;
            input.dataset.col = c;
            input.maxLength = 1;

            input.addEventListener("input", (e) => {
                let val = e.target.value;

                if (!/^[1-9]$/.test(val)) {
                    e.target.value = "";
                    e.target.classList.remove("correct", "wrong");
                    return;
                }

                const row = e.target.dataset.row;
                const col = e.target.dataset.col;

                if (parseInt(val) === solution[row][col]) {
                    e.target.classList.add("correct");
                    e.target.classList.remove("wrong");
                } else {
                    e.target.classList.add("wrong");
                    e.target.classList.remove("correct");
                }

                saveGame();

                if (checkWin()) {
                    stopTimer();
                    calculateScore();
                    setTimeout(() => alert("🎉 You solved the puzzle!"), 200);
                }
            });

            board.appendChild(input);
        }
    }
}

/* =========================
   🎮 GAME CONTROL
========================= */

function newGame() {
    clearInterval(timerInterval);

    solution = generateSolution();

    let removeCount =
        difficulty === "easy" ? 35 :
        difficulty === "medium" ? 45 : 55;

    puzzle = generatePuzzle(solution, removeCount);

    time = 0;
    score = 0;

    document.getElementById("timer").textContent = 0;
    document.getElementById("score").textContent = 0;

    createBoard();
    startTimer();
}

function resetGame() {
    clearInterval(timerInterval);
    time = 0;
    score = 0;

    document.getElementById("timer").textContent = 0;
    document.getElementById("score").textContent = 0;

    createBoard();
}

/* =========================
   ⏱ TIMER SYSTEM
========================= */

function startTimer() {
    clearInterval(timerInterval);

    timerInterval = setInterval(() => {
        time++;
        document.getElementById("timer").textContent = time;
        saveGame();
    }, 1000);
}

function stopTimer() {
    clearInterval(timerInterval);
}

/* =========================
   🏆 SCORE SYSTEM
========================= */

function calculateScore() {
    let base =
        difficulty === "easy" ? 1000 :
        difficulty === "medium" ? 2000 : 3000;

    score = Math.max(base - time * 5, 100);

    document.getElementById("score").textContent = score;
}

/* =========================
   🧠 WIN CHECK
========================= */

function checkWin() {
    const inputs = document.querySelectorAll("input");

    for (let input of inputs) {
        const r = input.dataset.row;
        const c = input.dataset.col;

        if (parseInt(input.value) !== solution[r][c]) {
            return false;
        }
    }

    return true;
}

/* =========================
   💾 SAVE / LOAD SYSTEM
========================= */

function saveGame() {
    const inputs = document.querySelectorAll("input");

    let state = [];

    inputs.forEach(input => {
        state.push({
            row: input.dataset.row,
            col: input.dataset.col,
            value: input.value,
            disabled: input.disabled
        });
    });

    localStorage.setItem(SAVE_KEY, JSON.stringify({
        puzzle,
        solution,
        difficulty,
        time,
        score,
        state
    }));
}

function loadGame() {
    const saved = localStorage.getItem(SAVE_KEY);
    if (!saved) return false;

    const data = JSON.parse(saved);

    puzzle = data.puzzle;
    solution = data.solution;
    difficulty = data.difficulty;
    time = data.time;
    score = data.score;

    createBoard();

    const inputs = document.querySelectorAll("input");

    inputs.forEach(input => {
        const match = data.state.find(
            s => s.row == input.dataset.row && s.col == input.dataset.col
        );

        if (match) {
            input.value = match.value;
            input.disabled = match.disabled;
        }
    });

    document.getElementById("timer").textContent = time;
    document.getElementById("score").textContent = score;

    startTimer();
    return true;
}

/* =========================
   🎚 DIFFICULTY
========================= */

function setDifficulty(level) {
    difficulty = level;
    newGame();
}

/* =========================
   🚀 START GAME
========================= */

window.onload = function () {
    const loaded = loadGame();
    if (!loaded) newGame();
};
</script>
</body>
</html>
