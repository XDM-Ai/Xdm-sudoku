<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sudoku Game</title>
<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        background: #f4f4f4;
    }

    h1 {
        margin-top: 20px;
    }

    .board {
        display: grid;
        grid-template-columns: repeat(9, 40px);
        grid-template-rows: repeat(9, 40px);
        justify-content: center;
        margin-top: 20px;
    }

    input {
        width: 38px;
        height: 38px;
        text-align: center;
        font-size: 18px;
        border: 1px solid #999;
    }

    input:disabled {
        background: #ddd;
        font-weight: bold;
    }

    button {
        margin-top: 20px;
        padding: 10px 20px;
        font-size: 16px;
        cursor: pointer;
    }

    .correct {
        background: #b6fcb6;
    }

    .wrong {
        background: #ffb6b6;
    }
</style>
</head>
<body>

<h1>Sudoku Game</h1>

<div class="board" id="board"></div>

<button onclick="checkSolution()">Check Solution</button>
<button onclick="resetGame()">Reset</button>

<script>
const puzzle = [
    [5,3,0,0,7,0,0,0,0],
    [6,0,0,1,9,5,0,0,0],
    [0,9,8,0,0,0,0,6,0],
    [8,0,0,0,6,0,0,0,3],
    [4,0,0,8,0,3,0,0,1],
    [7,0,0,0,2,0,0,0,6],
    [0,6,0,0,0,0,2,8,0],
    [0,0,0,4,1,9,0,0,5],
    [0,0,0,0,8,0,0,7,9]
];

const solution = [
    [5,3,4,6,7,8,9,1,2],
    [6,7,2,1,9,5,3,4,8],
    [1,9,8,3,4,2,5,6,7],
    [8,5,9,7,6,1,4,2,3],
    [4,2,6,8,5,3,7,9,1],
    [7,1,3,9,2,4,8,5,6],
    [9,6,1,5,3,7,2,8,4],
    [2,8,7,4,1,9,6,3,5],
    [3,4,5,2,8,6,1,7,9]
];

const board = document.getElementById("board");

function createBoard() {
    board.innerHTML = "";

    for (let r = 0; r < 9; r++) {
        for (let c = 0; c < 9; c++) {
            const input = document.createElement("input");

            if (puzzle[r][c] !== 0) {
                input.value = puzzle[r][c];
                input.disabled = true;
            }

            input.setAttribute("maxlength", "1");
            input.dataset.row = r;
            input.dataset.col = c;

            board.appendChild(input);
        }
    }
}

function checkSolution() {
    const inputs = document.querySelectorAll("input");

    inputs.forEach(input => {
        const r = input.dataset.row;
        const c = input.dataset.col;

        if (input.value == solution[r][c]) {
            input.classList.add("correct");
            input.classList.remove("wrong");
        } else {
            input.classList.add("wrong");
            input.classList.remove("correct");
        }
    });
}

function resetGame() {
    createBoard();
}

createBoard();
</script>

</body>
</html>
